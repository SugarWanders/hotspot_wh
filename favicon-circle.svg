<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- v2: ultra-bold geometric lion for 16-32px tabs -->
  <circle cx="32" cy="32" r="31" fill="#17121a"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#ff5f52" stroke-width="4"/>

  <!-- mane: single heavy mass -->
  <path d="M32 10 L49 19 L55 32 L49 45 L32 54 L15 45 L9 32 L15 19 Z" fill="#ff5f52"/>

  <!-- face: single block -->
  <path d="M32 22 L43 27 L43 39 L32 44 L21 39 L21 27 Z" fill="#f0cb73"/>

  <!-- eyes: thicker bars -->
  <rect x="24.5" y="30" width="6" height="4" rx="1" fill="#17121a"/>
  <rect x="33.5" y="30" width="6" height="4" rx="1" fill="#17121a"/>

  <!-- nose + mouth: single strong shape -->
  <path d="M32 34 L36 38 L32 42 L28 38 Z" fill="#17121a"/>
</svg>
