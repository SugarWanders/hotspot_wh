  <path d="M40 20 L44 14 L36 17 Z" fill="#ff6a5f"/>

  <!-- eyes (solid blocks) -->
  <rect x="26" y="29" width="4" height="3" rx="1" fill="#1f1720"/>
  <rect x="34" y="29" width="4" height="3" rx="1" fill="#1f1720"/>

  <!-- nose and mouth block -->
  <path d="M32 33 L35 36 L32 39 L29 36 Z" fill="#1f1720"/>
  <rect x="28" y="40" width="8" height="2.8" rx="1.4" fill="#1f1720"/>
