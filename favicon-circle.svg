  <circle cx="32" cy="32" r="31" fill="#1f1720"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#ff6a5f" stroke-width="3"/>

  <!-- geometric solid lion head -->
  <!-- mane (solid polygonal mass) -->
